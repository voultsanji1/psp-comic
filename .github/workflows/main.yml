name: Build PSP EBOOT

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Compile
        run: |
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ComicReader-EBOOT
          path: EBOOT.PBP
